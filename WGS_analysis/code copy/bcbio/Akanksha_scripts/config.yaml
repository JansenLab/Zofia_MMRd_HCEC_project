# Template for paired (tumor/normal) variant calling
---
details:
  - analysis: variant2
    genome_build: hg38
    algorithm:
      aligner: false
      variantcaller: [strelka2]
      exclude_regions: [lcr, polyx, altcontigs, highdepth]
      effects: vep
      tools_off:
        - snpeff
    resources:
      default:
        memory: 64G
        cores: 16
      gatk:
        jvm_opts: ["-Xms2g", "-Xmx32g"]
